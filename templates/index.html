<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Iris Classifier</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 40px; }
      label { display: block; margin: 6px 0 2px; }
      input[type=number], select { width: 100%; padding: 8px; margin-bottom: 10px; }
      button { padding: 8px 14px; }
      .card { border: 1px solid #ccc; padding: 14px; border-radius: 8px; max-width: 460px; }
      .error { color: red; }
      .scores { margin-top: 16px; }
      .scores li { margin-bottom: 4px; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Iris Species Prediction</h1>

      <form method="post">
        <label for="model">Choose algorithm</label>
        <select name="model" id="model">
          {% for m in model_scores.keys() %}
          <option value="{{ m }}" {% if m == selected_model %}selected{% endif %}>{{ m }}</option>
          {% endfor %}
        </select>

        <label for="sepal_length">Sepal Length</label>
        <input type="number" step="0.01" name="sepal_length" id="sepal_length" required>

        <label for="sepal_width">Sepal Width</label>
        <input type="number" step="0.01" name="sepal_width" id="sepal_width" required>

        <label for="petal_length">Petal Length</label>
        <input type="number" step="0.01" name="petal_length" id="petal_length" required>

        <label for="petal_width">Petal Width</label>
        <input type="number" step="0.01" name="petal_width" id="petal_width" required>

        <button type="submit">Predict</button>
      </form>

      {% if prediction %}
      <p><strong>Prediction:</strong> {{ prediction }}</p>
      {% endif %}

      {% if error %}
      <p class="error">Error: {{ error }}</p>
      {% endif %}

      <div class="scores">
        <h3>Model accuracy (test scores)</h3>
        <ul>
          {% for model, score in model_scores.items() %}
          <li><strong>{{ model }}:</strong> {{ (score * 100) | round(2) }}%</li>
          {% endfor %}
        </ul>
      </div>
    </div>
  </body>
</html>
