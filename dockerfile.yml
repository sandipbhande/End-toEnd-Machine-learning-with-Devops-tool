name: CI/CD Pipeline

on:
push:
branches: [ "main" ]

jobs:
build:
runs-on: ubuntu-latest

```
steps:
# 1. Checkout code
- name: Checkout code
  uses: actions/checkout@v3

# 2. Set up Docker
- name: Set up Docker
  uses: docker/setup-buildx-action@v3

# 3. Login to Docker Hub
- name: Login to Docker Hub
  run: |
    echo "${{ secrets.DOCKER_PASSWORD }}" | docker login \
      -u "${{ secrets.DOCKER_USERNAME }}" \
      --password-stdin

# 4. Build Docker Image
- name: Build Docker image
  run: |
    docker build \
      -t "${{ secrets.DOCKER_USERNAME }}/my-image:latest" \
      -t "${{ secrets.DOCKER_USERNAME }}/my-image:${{ github.sha }}" \
      .

# 5. Push Docker Image
- name: Push Docker image
  run: |
    docker push "${{ secrets.DOCKER_USERNAME }}/my-image:latest"
    docker push "${{ secrets.DOCKER_USERNAME }}/my-image:${{ github.sha }}"

# 6. Run container (test)
- name: Run Docker container
  run: |
    docker stop my-container || true
    docker rm my-container || true
    docker run -d \
      --name my-container \
      -p 5000:5000 \
      "${{ secrets.DOCKER_USERNAME }}/my-image:${{ github.sha }}"
    sleep 10
```
