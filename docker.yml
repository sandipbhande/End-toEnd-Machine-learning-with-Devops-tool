name: CI/CD Pipeline

on:
push:
branches: [ "main" ]

jobs:
build:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout code
    uses: actions/checkout@v3

  - name: Set up Docker
    uses: docker/setup-buildx-action@v3

  - name: Login to Docker Hub
    run: |
      echo "${{ secrets.DOCKER_PASSWORD }}" | docker login \
        -u "${{ secrets.DOCKER_USERNAME }}" \
        --password-stdin

  - name: Build Docker image
    run: |
      docker build \
        -t "${{ secrets.DOCKER_USERNAME }}/my-image:latest" \
        -t "${{ secrets.DOCKER_USERNAME }}/my-image:${{ github.sha }}" \
        .

  - name: Push Docker image
    run: |
      docker push "${{ secrets.DOCKER_USERNAME }}/my-image:latest"
      docker push "${{ secrets.DOCKER_USERNAME }}/my-image:${{ github.sha }}"

  - name: Run Docker container
    run: |
      docker stop my-container || true
      docker rm my-container || true
      docker run -d \
        --name my-container \
        -p 5000:5000 \
        "${{ secrets.DOCKER_USERNAME }}/my-image:${{ github.sha }}"
      sleep 10
```
